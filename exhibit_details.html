<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibit Detail | Museum of Echoes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="detail-view">
    <a href="index.html" class="back-btn">← Return to Gallery</a>
    
    <main class="detail-container">
        <h1 id="exhibit-title">Loading...</h1>
        <div id="exhibit-content" class="fade-in">
            </div>
    </main>

    <script>
        const data = {
            telegraph: {
                title: "The Telegraph (1837)",
                body: "Samuel Morse and Alfred Vail revolutionized communication. The world went from weeks of waiting to seconds."
            },
            radio: {
                title: "The Radio (1895)",
                body: "Guglielmo Marconi proved that the air could carry information. It was the birth of mass media."
            }
        };

        const params = new URLSearchParams(window.location.search);
        const item = params.get('item');

        if(data[item]) {
            document.getElementById('exhibit-title').innerText = data[item].title;
            document.getElementById('exhibit-content').innerHTML = `<p>${data[item].body}</p>`;
        }
    </script>
</body>
</html>
